name: Daily FAANG Notifier

on:
  schedule:
    # Runs every 5 minutes (the GitHub Actions minimum cadence)
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allows manual runs from the Actions tab

# Needed so the job can commit the updated seen_jobs.json back to the repo.
permissions:
  contents: write

# Avoid overlapping runs racing to push state.
concurrency:
  group: faang-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run notifier
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python faang_notifier.py

      - name: Persist seen jobs
        run: |
          if [[ -n "$(git status --porcelain seen_jobs.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add seen_jobs.json
            git commit -m "Update seen jobs [skip ci]"
            git push
          else
            echo "No change to seen_jobs.json"
          fi
